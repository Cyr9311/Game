<!DOCTYPE html>
<html>
<body>

<h2>Tic Tac Toe</h2>

<div id="board"></div>

<script>
let current="X";

for(let i=0;i<9;i++){
  let btn=document.createElement("button");
  btn.style.width="60px";
  btn.style.height="60px";

  btn.onclick=()=>{
    if(btn.innerHTML===""){
      btn.innerHTML=current;
      current=current==="X"?"O":"X";
    }
  };

  document.getElementById("board").appendChild(btn);

  if((i+1)%3===0)
    document.getElementById("board").appendChild(document.createElement("br"));
}
</script>

</body>
</html>
